<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Check</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #000; color: #0f0; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <h2>Bridge Status</h2>
    <pre id="out">Checking...</pre>

    <script>
        window.onload = function() {
            var out = "";
            var checks = [
                ["Android", typeof Android],
                ["FkOTPVerifier", typeof FkOTPVerifier],
                ["foa", typeof foa],
                ["window.Android", typeof window.Android],
                ["window.FkOTPVerifier", typeof window.FkOTPVerifier],
                ["window.foa", typeof window.foa]
            ];
            for (var i = 0; i < checks.length; i++) {
                out += checks[i][0] + " = " + checks[i][1] + "\n";
            }
            document.getElementById("out").innerText = out;

            // If Android exists, dump its methods
            if (typeof Android === "object") {
                try {
                    var methods = Object.getOwnPropertyNames(Android).join(", ");
                    document.getElementById("out").innerText += "\n\nAndroid methods:\n" + methods;
                } catch(e) {
                    document.getElementById("out").innerText += "\n\nCould not enumerate: " + e;
                }
            }
        };
    </script>
</body>
</html>
